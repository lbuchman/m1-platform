<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">M1 manufacturing test platform software integration</title>
  <desc id="desc">Software-only architecture for the M1 manufacturing test platform. React Operator UI communicates with the M1TFC REST server over HTTP JSON and server-sent events. The REST server invokes M1TFC as a local sudo process. M1TFC reads platform configuration and fixture artifacts and accesses Mercury firmware through its documented TCP and UDP terminal interfaces. The scheduled tfcroncli service handles cloud communication, logs, secrets, and nightly updates.</desc>
  <defs>
    <marker id="blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#176b87"/></marker>
    <marker id="green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#177451"/></marker>
    <style>
      .title { fill: #15323d; font-family: sans-serif; font-size: 30px; font-weight: 700; }
      .sub { fill: #4d6870; font-family: sans-serif; font-size: 16px; }
      .lane { fill: #4d6870; font-family: sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 1px; }
      .box { fill: #15323d; font-family: sans-serif; font-size: 21px; font-weight: 700; }
      .role { fill: #31505a; font-family: sans-serif; font-size: 14px; font-weight: 600; }
      .body { fill: #31505a; font-family: sans-serif; font-size: 14px; }
      .label { fill: #31505a; font-family: sans-serif; font-size: 13px; font-weight: 700; }
      .small { fill: #4d6870; font-family: sans-serif; font-size: 12px; }
    </style>
  </defs>

  <rect width="1500" height="900" fill="#f7faf9"/>
  <text x="55" y="55" class="title">M1 Manufacturing Test Platform: Software Integration</text>
  <text x="55" y="84" class="sub">Communication contracts only. Fixture wiring, pogo pins, and UUT hardware are intentionally outside this view.</text>

  <text x="55" y="132" class="lane">OPERATOR WORKSTATION</text>
  <rect x="55" y="152" width="350" height="174" rx="6" fill="#e6f2f5" stroke="#83afb9" stroke-width="2"/>
  <text x="85" y="193" class="box">Operator UI</text>
  <text x="85" y="220" class="role">React production/debug application</text>
  <text x="85" y="248" class="body">Starts configured test sequences</text>
  <text x="85" y="273" class="body">Displays status and live logs</text>
  <text x="85" y="301" class="small">Default development endpoint: http://127.0.0.1:3300</text>

  <text x="560" y="132" class="lane">FIXTURE PC: LIVE TEST PATH</text>
  <rect x="560" y="152" width="885" height="382" rx="6" fill="#e6f2f5" stroke="#83afb9" stroke-width="2"/>
  <rect x="600" y="196" width="290" height="130" rx="5" fill="#fff" stroke="#176b87" stroke-width="2"/>
  <text x="625" y="235" class="box">M1TFC REST Server</text>
  <text x="625" y="261" class="role">HTTP API and serialized command queue</text>
  <text x="625" y="287" class="body">Default bind: 0.0.0.0:3300</text>
  <text x="625" y="309" class="small">Separate process from M1TFC</text>

  <rect x="1060" y="196" width="335" height="130" rx="5" fill="#fff" stroke="#176b87" stroke-width="2"/>
  <text x="1085" y="235" class="box">M1TFC</text>
  <text x="1085" y="261" class="role">Fixture CLI and orchestration</text>
  <text x="1085" y="287" class="body">ICT, functional test, programming</text>
  <text x="1085" y="309" class="small">Owns sequencing, limits, logs, pass/fail policy</text>

  <path d="M405 326 V370 H745 V326" fill="none" stroke="#176b87" stroke-width="3" marker-end="url(#blue)"/>
  <text x="440" y="341" class="label">HTTP: JSON REST</text>
  <text x="440" y="356" class="small">POST /command, GET /health, GET /commands; SSE: GET /logs/stream</text>
  <path d="M890 326 V370 H1227 V326" fill="none" stroke="#176b87" stroke-width="3" marker-end="url(#blue)"/>
  <text x="930" y="341" class="label">Local process invocation</text>
  <text x="930" y="356" class="small">sudo -n m1tfc &lt;command&gt; ...</text>

  <rect x="600" y="390" width="330" height="104" rx="5" fill="#fff" stroke="#177451" stroke-width="2"/>
  <text x="625" y="426" class="box">Platform Runtime Files</text>
  <text x="625" y="452" class="role">Shared host configuration and fixture state</text>
  <text x="625" y="477" class="small">/etc/m1platform/config.json and calibration.json</text>
  <text x="625" y="494" class="small">/var/m1mtf: FSBL, firmware, images, logs</text>
  <path d="M1060 326 V390 H930" fill="none" stroke="#177451" stroke-width="3" marker-end="url(#green)"/>
  <text x="945" y="376" class="label">Local filesystem read/write</text>

  <rect x="1060" y="390" width="335" height="104" rx="5" fill="#fff" stroke="#a85616" stroke-width="2"/>
  <text x="1085" y="426" class="box">Mercury Firmware Terminal</text>
  <text x="1085" y="452" class="role">Mercury test-board network service</text>
  <text x="1085" y="477" class="small">TCP terminal: 192.168.0.60:23</text>
  <text x="1085" y="494" class="small">UDP terminal: 192.168.0.60:4111</text>
  <path d="M1227 326 V390" fill="none" stroke="#a85616" stroke-width="3" marker-end="url(#blue)"/>
  <text x="1242" y="365" class="label">Ethernet: TCP / UDP</text>

  <text x="55" y="596" class="lane">FIXTURE PC: SCHEDULED OPERATIONS</text>
  <rect x="55" y="616" width="1390" height="176" rx="6" fill="#edf7f2" stroke="#79ab95" stroke-width="2"/>
  <rect x="95" y="652" width="390" height="104" rx="5" fill="#fff" stroke="#177451" stroke-width="2"/>
  <text x="120" y="688" class="box">tfcroncli / m1client</text>
  <text x="120" y="714" class="role">Scheduled Fixture-PC application (cron)</text>
  <text x="120" y="738" class="body">Cloud communication, logs, secrets, nightly firmware/software updates</text>
  <rect x="1000" y="652" width="395" height="104" rx="5" fill="#fff" stroke="#177451" stroke-width="2"/>
  <text x="1025" y="688" class="box">Cloud / Release Services</text>
  <text x="1025" y="714" class="role">Remote operational endpoint</text>
  <text x="1025" y="738" class="body">Artifact retrieval and log/status exchange</text>
  <path d="M485 756 V786 H1000 V756" fill="none" stroke="#177451" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#green)"/>
  <text x="648" y="761" class="label">Network cloud communication</text>
  <text x="648" y="777" class="small">Protocol and endpoint are deployment configuration, not specified here</text>

  <rect x="55" y="838" width="1390" height="1" fill="#b9c8c9"/>
  <text x="55" y="865" class="small">Scope note: M1TFC-to-fixture device links are intentionally not named here because the available platform documentation identifies fixture ownership but does not define a single platform-wide transport contract.</text>
</svg>
